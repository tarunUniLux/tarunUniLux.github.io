<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tarun Purohit — Developer Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Epilogue:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0c0e;--s1:#131316;--s2:#1a1a1f;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.12);
  --text:#dddde8;--muted:#6b6b80;
  --green:#4ade80;--amber:#fbbf24;--blue:#60a5fa;--pink:#f472b6;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Epilogue',sans-serif;font-size:16px;line-height:1.7;overflow-x:hidden}
body{cursor:none}

/* CURSOR */
#cur{position:fixed;width:10px;height:10px;border-radius:50%;background:var(--green);pointer-events:none;z-index:9999;transform:translate(-50%,-50%)}
#cur2{position:fixed;width:36px;height:36px;border-radius:50%;border:1px solid rgba(74,222,128,0.35);pointer-events:none;z-index:9998;transform:translate(-50%,-50%)}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:1.25rem 5rem;border-bottom:1px solid var(--border);backdrop-filter:blur(20px);background:rgba(12,12,14,0.85)}
.nav-mark{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--green);text-decoration:none}
.nav-links{display:flex;gap:2rem;list-style:none}
.nav-links a{color:var(--muted);text-decoration:none;font-size:12px}

/* HERO */
.hero{min-height:100vh;display:grid;grid-template-columns:1fr 1fr;align-items:center;padding:8rem 5rem 5rem;gap:5rem}
.hero h1{font-family:'Playfair Display',serif;font-size:clamp(3rem,5.5vw,5.5rem)}
.hero-sub{color:var(--muted)}

/* SECTION */
.section{max-width:1100px;margin:0 auto;padding:6rem 5rem}

/* GRID FIXES */
.skills-cols{display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem}
.projects-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem}
.edu-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.25rem}
.exp-grid{display:grid;grid-template-columns:190px 1fr}
.contact-inner{display:grid;grid-template-columns:1fr 1fr;gap:5rem}

/* ========================= */
/* 🔥 RESPONSIVE FIXES BELOW */
/* ========================= */

@media (max-width: 1024px){
  nav{padding:1.25rem 2rem}
  .hero{padding:7rem 2rem 4rem}
  .section{padding:5rem 2rem}
}

@media (max-width: 768px){

  /* Disable custom cursor */
  body{cursor:auto}
  #cur,#cur2{display:none}

  /* NAV */
  nav{padding:1rem 1.5rem}
  .nav-links{display:none}

  /* HERO */
  .hero{
    grid-template-columns:1fr;
    padding:6rem 1.5rem 3rem;
    gap:2rem;
    text-align:left;
  }

  .hero h1{
    font-size:2.5rem;
  }

  .hero-sub{
    font-size:0.95rem;
  }

  /* SECTIONS */
  .section{
    padding:4rem 1.5rem;
  }

  /* EXPERIENCE */
  .exp-grid{
    grid-template-columns:1fr;
  }

  .exp-period{
    text-align:left;
    border:none;
    padding-bottom:0.5rem;
  }

  .exp-body{
    padding-left:0;
    margin-bottom:2rem;
  }

  /* SKILLS */
  .skills-cols{
    grid-template-columns:1fr;
  }

  /* PROJECTS */
  .projects-grid{
    grid-template-columns:1fr;
  }

  /* EDUCATION */
  .edu-grid{
    grid-template-columns:1fr;
  }

  /* CONTACT */
  .contact-inner{
    grid-template-columns:1fr;
    gap:2rem;
    padding:3rem 1.5rem;
  }

  /* FOOTER */
  footer{
    flex-direction:column;
    text-align:center;
    gap:0.5rem;
    padding:1.5rem;
  }

}

/* SMALL PHONES */
@media (max-width: 480px){
  .hero h1{font-size:2rem}
}
</style>
</head>
<body>

<!-- keep everything else EXACTLY SAME -->

</body>
</html>
